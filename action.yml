name: weread2notion-next sync
description: Sync WeRead books, highlights, and notes to Notion with incremental updates.
author: malinkang community

inputs:
  weread-api-key:
    description: WeRead Gateway API key.
    required: true
  notion-token:
    description: Notion integration token.
    required: true
  notion-page:
    description: Notion page URL or page id where the template should live.
    required: true
  python-version:
    description: Python version used to run the sync.
    required: false
    default: "3.11"
  sync-args:
    description: Extra arguments passed to `weread2notion-next sync`.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
    - name: Install weread2notion-next
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install "$GITHUB_ACTION_PATH"
    - name: Cache local sync state
      uses: actions/cache@v4
      with:
        path: .weread2notion-cache
        key: weread2notion-next-state-${{ github.repository_id }}
        restore-keys: |
          weread2notion-next-state-
    - name: Initialize template
      shell: bash
      env:
        WEREAD_API_KEY: ${{ inputs.weread-api-key }}
        NOTION_TOKEN: ${{ inputs.notion-token }}
        NOTION_PAGE: ${{ inputs.notion-page }}
      run: |
        for attempt in 1 2 3; do
          weread2notion-next init && exit 0
          status=$?
          if [ "$attempt" -eq 3 ]; then
            exit "$status"
          fi
          sleep $((attempt * 60))
        done
    - name: Sync WeRead to Notion
      shell: bash
      env:
        WEREAD_API_KEY: ${{ inputs.weread-api-key }}
        NOTION_TOKEN: ${{ inputs.notion-token }}
        NOTION_PAGE: ${{ inputs.notion-page }}
      run: |
        for attempt in 1 2 3; do
          weread2notion-next sync ${{ inputs.sync-args }} && exit 0
          status=$?
          if [ "$attempt" -eq 3 ]; then
            exit "$status"
          fi
          sleep $((attempt * 60))
        done
