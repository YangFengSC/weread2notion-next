<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>微信读书阅读热力图</title>
  <style>
    :root {
      color-scheme: dark light;
      --bg: #111827;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --empty: #253149;
      --l1: #1f6f43;
      --l2: #2f9e55;
      --l3: #63c174;
      --l4: #a7e8a5;
    }

    body {
      margin: 0;
      font: 14px/1.4 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: transparent;
    }

    .wrap {
      box-sizing: border-box;
      width: 100%;
      min-height: 190px;
      padding: 18px;
      border: 1px solid rgba(148, 163, 184, .22);
      border-radius: 10px;
      background: var(--bg);
    }

    .top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }

    .title {
      font-size: 18px;
      font-weight: 700;
    }

    .meta {
      color: var(--muted);
      white-space: nowrap;
    }

    .grid {
      display: grid;
      grid-auto-flow: column;
      grid-template-rows: repeat(7, 12px);
      grid-auto-columns: 12px;
      gap: 4px;
      overflow-x: auto;
      padding-bottom: 4px;
    }

    .cell {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      background: var(--empty);
    }

    .empty { opacity: 0; }
    .level-0 { background: var(--empty); }
    .level-1 { background: var(--l1); }
    .level-2 { background: var(--l2); }
    .level-3 { background: var(--l3); }
    .level-4 { background: var(--l4); }

    .legend {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 6px;
      margin-top: 12px;
      color: var(--muted);
      font-size: 12px;
    }

    .legend .cell {
      display: inline-block;
      flex: 0 0 auto;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="title" id="title">微信读书阅读热力图</div>
      <div class="meta" id="meta">加载中...</div>
    </div>
    <div class="grid" id="grid"></div>
    <div class="legend">
      <span>少</span>
      <span class="cell level-0"></span>
      <span class="cell level-1"></span>
      <span class="cell level-2"></span>
      <span class="cell level-3"></span>
      <span class="cell level-4"></span>
      <span>多</span>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const year = params.get("year") || String(new Date().getFullYear());

    fetch("heatmap-data.json", { cache: "no-store" })
      .then((response) => {
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return response.json();
      })
      .then((data) => render(data, year))
      .catch((error) => {
        document.getElementById("meta").textContent = `加载失败：${error.message}`;
      });

    function render(data, year) {
      const current = data.years?.[year] || { days: {}, total_minutes: 0, active_days: 0 };
      document.getElementById("title").textContent = `微信读书阅读热力图 ${year}`;
      const total = Number(current.total_minutes || 0);
      document.getElementById("meta").textContent = `${current.active_days || 0} 天 · ${Math.floor(total / 60)} 时 ${Math.round(total % 60)} 分`;

      const grid = document.getElementById("grid");
      grid.textContent = "";
      const firstDay = new Date(`${year}-01-01T00:00:00Z`).getUTCDay();
      const leading = (firstDay + 6) % 7;
      for (let i = 0; i < leading; i += 1) {
        grid.appendChild(cell(0, "", true));
      }
      for (const day of daysOfYear(Number(year))) {
        const minutes = Number(current.days?.[day] || 0);
        grid.appendChild(cell(level(minutes), `${day}: ${minutes} 分钟`));
      }
    }

    function cell(level, title, empty = false) {
      const el = document.createElement("span");
      el.className = `cell level-${level}${empty ? " empty" : ""}`;
      if (title) el.title = title;
      return el;
    }

    function daysOfYear(year) {
      const result = [];
      const date = new Date(Date.UTC(year, 0, 1));
      while (date.getUTCFullYear() === year) {
        result.push(date.toISOString().slice(0, 10));
        date.setUTCDate(date.getUTCDate() + 1);
      }
      return result;
    }

    function level(minutes) {
      if (minutes <= 0) return 0;
      if (minutes < 10) return 1;
      if (minutes < 30) return 2;
      if (minutes < 60) return 3;
      return 4;
    }
  </script>
</body>
</html>
