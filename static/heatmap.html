<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>微信读书记录</title>
  <style>
    :root {
      color-scheme: dark light;
      --bg: #111827;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --empty: #253149;
      --l1: #1f6f43;
      --l2: #2f9e55;
      --l3: #63c174;
      --l4: #a7e8a5;
    }

    body {
      margin: 0;
      font: 14px/1.4 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: transparent;
    }

    .wrap {
      box-sizing: border-box;
      width: 100%;
      min-height: 214px;
      padding: 18px;
      border: 1px solid rgba(148, 163, 184, .22);
      border-radius: 10px;
      background: var(--bg);
    }

    .top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }

    .heading {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .title {
      font-size: 18px;
      font-weight: 700;
    }

    .meta {
      color: var(--muted);
      white-space: nowrap;
    }

    .year-select {
      height: 30px;
      padding: 0 28px 0 10px;
      border: 1px solid rgba(148, 163, 184, .28);
      border-radius: 7px;
      color: var(--text);
      background: #1f2937;
      font: inherit;
    }

    .chart {
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr);
      column-gap: 8px;
      align-items: start;
    }

    .weekdays {
      display: grid;
      grid-template-rows: repeat(7, 12px);
      gap: 4px;
      margin-top: 22px;
      color: var(--muted);
      font-size: 12px;
      text-align: right;
    }

    .weekdays span {
      height: 12px;
      line-height: 12px;
    }

    .scroller {
      overflow-x: auto;
      padding-bottom: 4px;
    }

    .months {
      position: relative;
      height: 18px;
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .month {
      position: absolute;
      top: 0;
      height: 18px;
      line-height: 18px;
      white-space: nowrap;
    }

    .grid {
      display: grid;
      grid-auto-flow: column;
      grid-template-rows: repeat(7, 12px);
      grid-auto-columns: 12px;
      gap: 4px;
    }

    .cell {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      background: var(--empty);
    }

    .empty { opacity: 0; }
    .level-0 { background: var(--empty); }
    .level-1 { background: var(--l1); }
    .level-2 { background: var(--l2); }
    .level-3 { background: var(--l3); }
    .level-4 { background: var(--l4); }

    .legend {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 6px;
      margin-top: 12px;
      color: var(--muted);
      font-size: 12px;
    }

    .legend .cell {
      display: inline-block;
      flex: 0 0 auto;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="heading">
        <div class="title" id="title">微信读书记录</div>
        <select class="year-select" id="yearSelect" aria-label="选择年份"></select>
      </div>
      <div class="meta" id="meta">加载中...</div>
    </div>
    <div class="chart">
      <div class="weekdays">
        <span>周一</span>
        <span></span>
        <span>周三</span>
        <span></span>
        <span>周五</span>
        <span></span>
        <span></span>
      </div>
      <div class="scroller">
        <div class="months" id="months"></div>
        <div class="grid" id="grid"></div>
      </div>
    </div>
    <div class="legend">
      <span>少</span>
      <span class="cell level-0"></span>
      <span class="cell level-1"></span>
      <span class="cell level-2"></span>
      <span class="cell level-3"></span>
      <span class="cell level-4"></span>
      <span>多</span>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    let selectedYear = params.get("year") || String(new Date().getFullYear());
    let heatmapData = null;

    fetch("heatmap-data.json", { cache: "no-store" })
      .then((response) => {
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return response.json();
      })
      .then((data) => {
        heatmapData = data;
        selectedYear = normalizeYear(data, selectedYear);
        setupYearSelect(data, selectedYear);
        render(data, selectedYear);
      })
      .catch((error) => {
        document.getElementById("meta").textContent = `加载失败：${error.message}`;
      });

    document.getElementById("yearSelect").addEventListener("change", (event) => {
      selectedYear = event.target.value;
      const next = new URL(location.href);
      next.searchParams.set("year", selectedYear);
      history.replaceState(null, "", next);
      if (heatmapData) render(heatmapData, selectedYear);
    });

    function setupYearSelect(data, year) {
      const select = document.getElementById("yearSelect");
      select.textContent = "";
      for (const item of availableYears(data)) {
        const option = document.createElement("option");
        option.value = item;
        option.textContent = item;
        option.selected = item === year;
        select.appendChild(option);
      }
    }

    function normalizeYear(data, year) {
      const years = availableYears(data);
      if (years.includes(year)) return year;
      return years[years.length - 1] || year;
    }

    function availableYears(data) {
      const years = Object.keys(data.years || {}).sort();
      return years;
    }

    function render(data, year) {
      const current = data.years?.[year] || { days: {}, total_minutes: 0, active_days: 0 };
      document.getElementById("title").textContent = `微信读书记录 ${year}`;
      const total = Number(current.total_minutes || 0);
      const days = daysOfYear(Number(year));
      const longest = longestStreak(days, current.days || {});
      document.getElementById("meta").textContent = `${Math.floor(total / 60)} 时 ${Math.round(total % 60)} 分 · 阅读 ${current.active_days || 0} 天 · 最长连续 ${longest} 天`;

      const grid = document.getElementById("grid");
      const months = document.getElementById("months");
      grid.textContent = "";
      months.textContent = "";
      const firstDay = new Date(`${year}-01-01T00:00:00Z`).getUTCDay();
      const leading = (firstDay + 6) % 7;
      const totalCells = leading + days.length;
      const weekCount = Math.ceil(totalCells / 7);
      const chartWidth = weekCount * 16 - 4;
      grid.style.width = `${chartWidth}px`;
      months.style.width = `${chartWidth}px`;
      for (let i = 0; i < leading; i += 1) {
        grid.appendChild(cell(0, "", true));
      }
      for (const day of days) {
        const minutes = Number(current.days?.[day] || 0);
        grid.appendChild(cell(level(minutes), `${day}: ${minutes} 分钟`));
      }
      for (const label of monthLabels(Number(year), leading)) {
        const el = document.createElement("span");
        el.className = "month";
        el.style.left = `${label.week * 16}px`;
        el.textContent = label.text;
        months.appendChild(el);
      }
    }

    function cell(level, title, empty = false) {
      const el = document.createElement("span");
      el.className = `cell level-${level}${empty ? " empty" : ""}`;
      if (title) el.title = title;
      return el;
    }

    function daysOfYear(year) {
      const result = [];
      const date = new Date(Date.UTC(year, 0, 1));
      while (date.getUTCFullYear() === year) {
        result.push(date.toISOString().slice(0, 10));
        date.setUTCDate(date.getUTCDate() + 1);
      }
      return result;
    }

    function monthLabels(year, leading) {
      const labels = [];
      for (let month = 0; month < 12; month += 1) {
        const date = new Date(Date.UTC(year, month, 1));
        const start = new Date(Date.UTC(year, 0, 1));
        const dayIndex = Math.floor((date - start) / 86400000);
        labels.push({
          text: `${month + 1}月`,
          week: Math.floor((leading + dayIndex) / 7),
        });
      }
      return labels;
    }

    function longestStreak(days, values) {
      let current = 0;
      let longest = 0;
      for (const day of days) {
        if (Number(values[day] || 0) > 0) {
          current += 1;
          longest = Math.max(longest, current);
        } else {
          current = 0;
        }
      }
      return longest;
    }

    function level(minutes) {
      if (minutes <= 0) return 0;
      if (minutes < 10) return 1;
      if (minutes < 30) return 2;
      if (minutes < 60) return 3;
      return 4;
    }
  </script>
</body>
</html>
